[platformio]
default_envs = esp32-s2-devkit-lipo-usb

[env:esp32-s2-devkit-lipo-usb]
platform = espressif32
board = esp32-s2-saola-1
framework = arduino

# ---- Upload / Monitor ----
upload_speed = 921600
monitor_speed = 115200

# Native USB upload (CDC)
upload_protocol = esptool

# ---- Flash Settings ----
board_build.flash_mode = dio
board_build.flash_size = 4MB

# ---- PSRAM (ONLY for WROVER variant) ----
# board_build.psram = enabled
# build_flags =
#   -DBOARD_HAS_PSRAM
#   -mfix-esp32-psram-cache-issue

# ---- Native USB CDC ENABLED ----
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

# ---- Debugging ----
monitor_filters = esp32_exception_decoder

# ---- Optimization ----
build_unflags = -Os
build_flags =
  ${env.build_flags}
  -O2
  -Wall

# ---- Libraries ----
lib_deps =
  # adafruit/Adafruit NeoPixel@^1.11.0