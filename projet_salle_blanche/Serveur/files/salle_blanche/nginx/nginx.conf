# Nginx — non-root (port 8080)
worker_processes 1;

# Pid dans un dossier accessible sans root
pid /tmp/nginx.pid;

events {
    worker_connections 512;   # Limité pour Raspberry Pi 3B+
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Cache temporaire accessible sans root
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    sendfile on;
    keepalive_timeout 30;
    gzip on;

    server {
        # Port 8080 (non-root ne peut pas écouter sur 80)
        listen 8080;
        server_name _;

        # ── Front — fichiers statiques Chart.js ──────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── API — reverse proxy vers Node.js ─────────────────────
        location /api/ {
            proxy_pass         http://node:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
        }
    }
}
