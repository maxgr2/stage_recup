version: "3.8"

services:

  # ─── Broker MQTT ───────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    user: "1883:1883"           # utilisateur non-root mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - salle_blanche_net

  # ─── Backend Node.js ───────────────────────────────────────────
  node:
    build: ./node
    container_name: node_backend
    restart: unless-stopped
    user: "1000:1000"           # utilisateur non-root node
    environment:
      - MQTT_BROKER=mosquitto   # nom du service Docker = hostname réseau
      - MQTT_PORT=1883
      - MQTT_TOPIC=ets/salle1/mesures
      - DB_PATH=/app/data/mesures.db
      - API_PORT=3000
    volumes:
      - node_data:/app/data     # volume persistant pour SQLite
    depends_on:
      - mosquitto
    networks:
      - salle_blanche_net

  # ─── Nginx front + reverse proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_front
    restart: unless-stopped
    user: "101:101"             # utilisateur non-root nginx
    ports:
      - "80:8080"               # nginx écoute sur 8080 en non-root, mappé sur 80 host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - node
    networks:
      - salle_blanche_net

volumes:
  node_data:

networks:
  salle_blanche_net:
    driver: bridge
